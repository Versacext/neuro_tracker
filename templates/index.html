<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neurostate: Cognitive Tracking System</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <div class="container">
        <div class="header">
            <h1 class="title">Neurostate</h1>
            <div class="subtitle">Cognitive Tracking System - Academic Module</div>
        </div>

        <nav class="nav-menu">
            <a href="#" class="nav-link active">Мониторинг</a>
        </nav>

        <div class="form-group">
            <label for="levelField">Уровень напряжения (1-8):</label>
            <input type="number" id="levelField" placeholder="Пример: 4" min="1" max="8">
        </div>

        <div class="form-group">
            <label for="notesField">Примечание:</label>
            <input type="text" id="notesField" placeholder="Пример: Состояние в норме">
        </div>

        <button onclick="saveMeasurement()">Записать в базу</button>

        <div class="output-box" id="outputBox">
            Ожидание ввода данных.
        </div>

        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-title">Текущий день</div>
                <div class="metric-value" id="currentDay">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Всего замеров</div>
                <div class="metric-value" id="totalMeasurements">0</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Средний уровень</div>
                <div class="metric-value" id="avgLevel">0.00</div>
            </div>
            <div class="metric-card">
                <div class="metric-title">Макс. уровень</div>
                <div class="metric-value" id="maxLevel">0</div>
            </div>
        </div>

        <button onclick="clearDatabase()" style="background-color: #dc3545; margin-top: 15px;">Очистить базу данных</button>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
